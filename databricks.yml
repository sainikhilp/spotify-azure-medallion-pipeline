# This is a Databricks asset bundle definition for spotify_dab.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: spotify_dab
  uuid: 199abe90-524c-47f2-8235-b453756493d9

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405615539726621.1.azuredatabricks.net
    presets:
      source_linked_deployment: false
    variables:
      catalog: saispotifydatabricks
      schema: dev
  prod:
    mode: production
    workspace:
      host: http://127.0.0.1:7073
      # We explicitly deploy to /Workspace/Users/csainikhil123@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/csainikhil123@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: saispotifydatabricks
      schema: prod
    permissions:
      - user_name: csainikhil123@gmail.com
        level: CAN_MANAGE
